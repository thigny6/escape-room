<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Compte à rebours — Projet Hélios</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    -webkit-user-select: none; user-select: none;
  }

  #wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 4vh 4vw;
    background: radial-gradient(ellipse at center, #0a1424 0%, #050a14 70%);
    transition: background 0.6s;
  }
  #wrap.warning { background: radial-gradient(ellipse at center, #2a1a05 0%, #1a0c02 70%); }
  #wrap.critical {
    background: radial-gradient(ellipse at center, #3a0a0a 0%, #1a0000 70%);
    animation: critical-flash 0.9s infinite;
  }
  #wrap.stopped { background: radial-gradient(ellipse at center, #0a2418 0%, #050f08 70%); }

  @keyframes critical-flash {
    0%, 100% { background: radial-gradient(ellipse at center, #3a0a0a 0%, #1a0000 70%); }
    50%      { background: radial-gradient(ellipse at center, #5a1010 0%, #2a0000 70%); }
  }

  #label {
    color: #ff8800; font-size: clamp(12px, 2vw, 16px);
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 3vh;
    animation: pulse-label 2s infinite;
  }
  #label.stopped { color: #22c55e; animation: none; }
  #label.idle { color: #666; animation: none; }
  #label.paused { color: #88aaff; animation: none; }
  @keyframes pulse-label {
    0%, 100% { opacity: 1 } 50% { opacity: 0.5 }
  }

  #timer {
    font-size: clamp(80px, 22vw, 220px);
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 4px;
    color: #4dff8a;
    text-shadow: 0 0 40px rgba(77, 255, 138, 0.4);
    transition: color 0.5s, text-shadow 0.5s;
  }
  #timer.warning {
    color: #ffaa00;
    text-shadow: 0 0 40px rgba(255, 170, 0, 0.5);
  }
  #timer.critical {
    color: #ff4444;
    text-shadow: 0 0 50px rgba(255, 68, 68, 0.7);
    animation: timer-shake 0.4s infinite;
  }
  #timer.paused {
    color: #88aaff;
    text-shadow: 0 0 30px rgba(136, 170, 255, 0.4);
    opacity: 0.7;
  }
  @keyframes timer-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  #subtext {
    margin-top: 4vh;
    color: #666; font-size: clamp(11px, 1.6vw, 14px);
    letter-spacing: 2px; text-align: center;
    min-height: 20px;
  }

  #pause-badge {
    position: absolute; top: 3vh; right: 4vw;
    color: #88aaff; font-size: clamp(14px, 2vw, 18px);
    font-weight: 700; letter-spacing: 3px;
    display: none;
  }
  #pause-badge.active { display: block; animation: pulse-label 1.5s infinite; }

  /* End overlays */
  #overlay-end {
    position: fixed; inset: 0; z-index: 800;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 6vh 5vw; text-align: center;
  }
  #overlay-end.active { display: flex; }
  #overlay-end.victory { background: radial-gradient(ellipse at center, #0a3d1a 0%, #062a10 70%); }
  #overlay-end.defeat  { background: radial-gradient(ellipse at center, #3d0a0a 0%, #2a0606 70%); }
  .end-title {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900; line-height: 1.3;
    letter-spacing: 2px; white-space: pre-line;
  }
  #overlay-end.victory .end-title { color: #6bff9a; }
  #overlay-end.defeat .end-title { color: #ff6b6b; }

  #status {
    position: absolute; bottom: 8px; right: 12px;
    color: #333; font-size: 10px;
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="pause-badge">⏸ PAUSE</div>
  <div id="label" class="idle">EN ATTENTE DE DÉMARRAGE</div>
  <div id="timer">60:00</div>
  <div id="subtext">Projet Hélios · Système atmosphérique</div>
</div>

<div id="overlay-end">
  <div class="end-title" id="end-title"></div>
</div>

<div id="status">connexion…</div>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script>
'use strict';

const DURATION_SEC = 60 * 60; // 60 minutes
let state = 'idle';            // 'idle' | 'running' | 'paused' | 'stopped'
let endTimestamp = 0;          // when running, the Date.now() when timer reaches 0
let pausedRemaining = DURATION_SEC * 1000; // ms remaining when paused or idle
let tickInterval = null;
let defeatPublished = false;

const wrap = document.getElementById('wrap');
const label = document.getElementById('label');
const timer = document.getElementById('timer');
const subtext = document.getElementById('subtext');
const pauseBadge = document.getElementById('pause-badge');
const overlayEnd = document.getElementById('overlay-end');
const endTitle = document.getElementById('end-title');
const statusEl = document.getElementById('status');

/* ════════════════════════════════════════════════════════
   ABLY
   ════════════════════════════════════════════════════════ */
let ablyChannel = null;
try {
  const ably = new Ably.Realtime('2-HTpw.um5J9g:1h7mQARfiS4itHjEHeteJhBb09drdSetOUpFHIaA28U');
  ably.connection.on('connected', () => {
    statusEl.textContent = '✓ connecté';
    statusEl.style.color = '#22c55e';
  });
  ably.connection.on('failed', () => {
    statusEl.textContent = '✗ déconnecté';
    statusEl.style.color = '#ff6b6b';
  });
  ablyChannel = ably.channels.get('helios-control');
  ablyChannel.subscribe(onControlMessage);
} catch(e) { console.error('Ably init:', e); }

let bc = null;
try {
  bc = new BroadcastChannel('helios-control');
  bc.onmessage = (e) => onControlMessage(e.data);
} catch(e) {}

function publish(name, data) {
  data = data || {};
  if (ablyChannel) { try { ablyChannel.publish(name, data); } catch(e) {} }
  if (bc) { try { bc.postMessage({ name, data }); } catch(e) {} }
}

function onControlMessage(msg) {
  const name = msg.name;
  const data = msg.data || {};
  console.log('[Timer] msg:', name, data);

  if (name === 'master-start-timer') {
    startTimer();
  } else if (name === 'master-pause-timer') {
    pauseTimer();
  } else if (name === 'master-resume-timer') {
    resumeTimer();
  } else if (name === 'master-reset-timer') {
    resetTimer();
  } else if (name === 'master-victory') {
    stopTimer('victory');
    showEnd('victory');
  } else if (name === 'master-defeat') {
    stopTimer('defeat');
    showEnd('defeat');
  } else if (name === 'master-clear-end') {
    hideEnd();
  } else if (name === 'master-reset-all') {
    hideEnd();
    resetTimer();
  }
}

/* ════════════════════════════════════════════════════════
   TIMER LOGIC
   ════════════════════════════════════════════════════════ */
function startTimer() {
  state = 'running';
  defeatPublished = false;
  stopClockTick();
  pausedRemaining = DURATION_SEC * 1000;
  endTimestamp = Date.now() + pausedRemaining;
  label.textContent = 'TEMPS RESTANT';
  label.className = '';
  pauseBadge.classList.remove('active');
  hideEnd();
  startTick();
}

function pauseTimer() {
  if (state !== 'running') return;
  state = 'paused';
  pausedRemaining = Math.max(0, endTimestamp - Date.now());
  stopTick();
  label.textContent = 'EN PAUSE';
  label.className = 'paused';
  timer.classList.add('paused');
  pauseBadge.classList.add('active');
}

function resumeTimer() {
  if (state !== 'paused') return;
  state = 'running';
  endTimestamp = Date.now() + pausedRemaining;
  label.textContent = 'TEMPS RESTANT';
  label.className = '';
  timer.classList.remove('paused');
  pauseBadge.classList.remove('active');
  startTick();
}

function stopTimer(reason) {
  state = 'stopped';
  stopTick();
  label.textContent = reason === 'victory' ? 'MISSION RÉUSSIE' : 'TEMPS ÉCOULÉ';
  label.className = 'stopped';
  pauseBadge.classList.remove('active');
  if (reason === 'victory') {
    wrap.classList.remove('warning', 'critical');
    wrap.classList.add('stopped');
    timer.classList.remove('warning', 'critical', 'paused');
    timer.style.color = '#22c55e';
    timer.style.textShadow = '0 0 30px rgba(34,197,94,0.5)';
  }
}

function resetTimer() {
  state = 'idle';
  defeatPublished = false;
  stopTick();
  endTimestamp = 0;
  pausedRemaining = DURATION_SEC * 1000;
  label.textContent = 'EN ATTENTE DE DÉMARRAGE';
  label.className = 'idle';
  pauseBadge.classList.remove('active');
  wrap.classList.remove('warning', 'critical', 'stopped');
  timer.classList.remove('warning', 'critical', 'paused');
  timer.style.color = '';
  timer.style.textShadow = '';
  startClockTick();
}

/* ─── LIVE CLOCK (shown while idle) ─── */
let clockInterval = null;
function startClockTick() {
  stopClockTick();
  renderClock();
  clockInterval = setInterval(renderClock, 1000);
}
function stopClockTick() {
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
}
function renderClock() {
  if (state !== 'idle') { stopClockTick(); return; }
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  timer.textContent = hh + ':' + mm;
}

function startTick() {
  stopTick();
  tickInterval = setInterval(tick, 200);
  tick();
}
function stopTick() {
  if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
}

function tick() {
  if (state !== 'running') return;
  const remainingMs = endTimestamp - Date.now();
  if (remainingMs <= 0) {
    renderTime(0);
    stopTick();
    state = 'stopped';
    if (!defeatPublished) {
      defeatPublished = true;
      publish('master-defeat');
      showEnd('defeat');
      label.textContent = 'TEMPS ÉCOULÉ';
      label.className = 'stopped';
    }
    return;
  }
  renderTime(remainingMs);
  updateColorState(remainingMs);
}

function renderTime(ms) {
  const totalSec = Math.ceil(ms / 1000);
  const mm = Math.floor(totalSec / 60);
  const ss = totalSec % 60;
  timer.textContent = String(mm).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
}

function updateColorState(ms) {
  const minRemaining = ms / 60000;
  wrap.classList.remove('warning', 'critical', 'stopped');
  timer.classList.remove('warning', 'critical', 'paused');
  if (minRemaining < 5) {
    wrap.classList.add('critical');
    timer.classList.add('critical');
  } else if (minRemaining < 15) {
    wrap.classList.add('warning');
    timer.classList.add('warning');
  }
}

/* ════════════════════════════════════════════════════════
   END OVERLAYS
   ════════════════════════════════════════════════════════ */
function showEnd(kind) {
  overlayEnd.classList.remove('victory', 'defeat');
  overlayEnd.classList.add(kind);
  if (kind === 'victory') endTitle.textContent = 'VOUS AVEZ SAUVÉ LE PROJET HÉLIOS,\nFÉLICITATIONS';
  else endTitle.textContent = "VOUS N'ÊTES PAS PARVENUS À SAUVER LE PROJET HÉLIOS\n\nVOUS ÊTES MORTS ASPHYXIÉS";
  overlayEnd.classList.add('active');
}
function hideEnd() { overlayEnd.classList.remove('active'); }

// Init
startClockTick();
</script>
</body>
</html>

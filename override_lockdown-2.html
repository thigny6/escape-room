<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Override Hélios">
<title>Override Lockdown — Projet Hélios</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: 'Courier New', monospace;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: manipulation;
    color: #fff;
  }

  .page {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 4vh 5vw; text-align: center;
  }
  .page.active { display: flex; }

  /* ───────── LANDING ───────── */
  #page-landing {
    background: radial-gradient(ellipse at center, #1a0a05 0%, #050202 70%);
  }
  .landing-warn {
    color: #ff8800; font-size: clamp(14px, 4vw, 18px);
    font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 2vh;
    animation: blink-warn 1.6s infinite;
  }
  @keyframes blink-warn { 0%, 70%, 100% { opacity: 1 } 35% { opacity: 0.4 } }
  .landing-title {
    color: #fff; font-size: clamp(20px, 5vw, 28px);
    font-weight: 800; margin-bottom: 1vh;
    letter-spacing: 1.5px;
  }
  .landing-sub {
    color: #888; font-size: clamp(12px, 3vw, 14px);
    margin-bottom: 6vh; max-width: 320px;
    line-height: 1.6;
  }

  .override-btn {
    width: min(82vw, 380px);
    padding: 32px 24px;
    background: radial-gradient(circle at 35% 35%, #ff5a2a 0%, #c4380a 60%, #6a1d00 100%);
    border: 4px solid #800000;
    border-radius: 18px;
    color: #fff; font-family: inherit;
    font-size: clamp(16px, 4.4vw, 22px);
    font-weight: 900; letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 0 50px rgba(255, 80, 0, 0.4),
                inset 0 -8px 16px rgba(0,0,0,0.4),
                inset 0 8px 16px rgba(255,200,150,0.2);
    line-height: 1.35; touch-action: manipulation;
    transition: transform 0.1s;
  }
  .override-btn:active { transform: scale(0.97); }
  .override-btn small {
    display: block; font-size: 0.55em;
    font-weight: 600; opacity: 0.85;
    margin-top: 10px; letter-spacing: 1px;
  }

  .landing-foot {
    margin-top: 4vh; color: #444;
    font-size: 10px; letter-spacing: 2px;
  }

  /* ───────── RED BUTTON PAGE ───────── */
  #page-red {
    background: #1a0000;
    justify-content: center;
  }
  .red-label {
    color: #fff; font-size: clamp(12px, 3.2vw, 16px);
    margin-bottom: 3vh; letter-spacing: 2px;
    text-transform: uppercase;
    max-width: 320px; line-height: 1.5;
  }
  .red-btn {
    width: min(78vmin, 480px); height: min(78vmin, 480px);
    border-radius: 50%;
    border: 6px solid #800000;
    background: radial-gradient(circle at 35% 35%, #ff3a3a 0%, #c40000 60%, #700000 100%);
    cursor: pointer; touch-action: none;
    box-shadow: 0 0 60px rgba(255, 0, 0, 0.45),
                inset 0 -20px 30px rgba(0,0,0,0.4),
                inset 0 20px 40px rgba(255,180,180,0.2);
    user-select: none;
    transition: transform 0.1s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .red-btn.pressing {
    transform: scale(0.96);
    box-shadow: 0 0 80px rgba(255, 0, 0, 0.7),
                inset 0 -10px 20px rgba(0,0,0,0.5),
                inset 0 30px 50px rgba(255,200,200,0.3);
  }
  .red-code {
    margin-top: 4vh;
    color: #fff; font-size: clamp(48px, 12vw, 90px);
    font-weight: 900; letter-spacing: 18px;
    font-family: 'Courier New', monospace;
    min-height: 1.2em;
    text-shadow: 0 0 24px rgba(255, 200, 200, 0.9);
  }

  /* ───────── END STATES ───────── */
  #overlay-end {
    position: fixed; inset: 0; z-index: 800;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 6vh 5vw; text-align: center;
  }
  #overlay-end.active { display: flex; }
  #overlay-end.victory {
    background: radial-gradient(ellipse at center, #0a3d1a 0%, #062a10 70%);
  }
  #overlay-end.defeat {
    background: radial-gradient(ellipse at center, #3d0a0a 0%, #2a0606 70%);
  }
  .end-title {
    font-size: clamp(22px, 6vw, 38px);
    font-weight: 900; line-height: 1.3;
    letter-spacing: 2px;
    white-space: pre-line;
  }
  #overlay-end.victory .end-title { color: #6bff9a; }
  #overlay-end.defeat .end-title { color: #ff6b6b; }
</style>
</head>
<body>

<!-- ───────── LANDING ───────── -->
<div class="page active" id="page-landing">
  <div class="landing-warn">⚠ ZONE RESTREINTE ⚠</div>
  <div class="landing-title">SYSTÈME D'URGENCE</div>
  <div class="landing-sub">Procédure de dernier recours.<br>Réservée aux situations critiques.</div>
  <button class="override-btn" onclick="triggerOverride()">
    OVERRIDE LOCKDOWN
    <small>(en cas de danger mortel uniquement)</small>
  </button>
  <div class="landing-foot">PROJET HÉLIOS · TERMINAL DE SECOURS</div>
</div>

<!-- ───────── RED BUTTON PAGE ───────── -->
<div class="page" id="page-red">
  <div class="red-label">Maintenir le contact sur les trois appareils simultanément</div>
  <div class="red-btn" id="red-btn"></div>
  <div class="red-code" id="red-code">_ _ _</div>
</div>

<!-- ───────── END OVERLAYS ───────── -->
<div id="overlay-end">
  <div class="end-title" id="end-title"></div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script>
'use strict';

const DEVICE_ID = 'phone';
const CODE_FRAGMENT = '2 _ _'; // phone shows first digit

let currentPage = 'landing';
let previousPage = 'landing';

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  currentPage = id;
}

/* ════════════════════════════════════════════════════════
   ABLY
   ════════════════════════════════════════════════════════ */
let ablyChannel = null;
try {
  const ably = new Ably.Realtime('2-HTpw.um5J9g:1h7mQARfiS4itHjEHeteJhBb09drdSetOUpFHIaA28U');
  ably.connection.on('connected', () => console.log('[Ably OL] ✅'));
  ablyChannel = ably.channels.get('helios-control');
  ablyChannel.subscribe(onAblyMessage);
} catch (e) { console.error('[Ably OL] init error:', e); }

let bc = null;
try {
  bc = new BroadcastChannel('helios-control');
  bc.onmessage = (e) => onAblyMessage(e.data);
} catch(e) {}

function publish(name, data) {
  data = data || {};
  if (ablyChannel) { try { ablyChannel.publish(name, data); } catch(e) {} }
  if (bc) { try { bc.postMessage({ name, data }); } catch(e) {} }
}

function onAblyMessage(msg) {
  const name = msg.name;
  const data = msg.data || {};
  console.log('[OL] msg:', name, data);

  if (name === 'press-state') {
    if (data.device !== DEVICE_ID) {
      remotePressState[data.device] = !!data.pressing;
      updateRedCodeDisplay();
    }
  } else if (name === 'master-victory') {
    showEnd('victory');
  } else if (name === 'master-defeat') {
    showEnd('defeat');
  } else if (name === 'master-clear-end') {
    hideEnd();
  } else if (name === 'master-reset-red') {
    backToLanding();
  } else if (name === 'master-reset-all') {
    resetAll();
  }
}

/* ════════════════════════════════════════════════════════
   OVERRIDE
   ════════════════════════════════════════════════════════ */
function triggerOverride() {
  publish('override-trigger', { from: DEVICE_ID });
  showPage('red');
}

function backToLanding() {
  showPage('landing');
  redLocalPressing = false;
  remotePressState = { phone: false, tablette: false, tableau: false };
  redBtn.classList.remove('pressing');
  redCodeEl.textContent = '_ _ _';
}

/* ════════════════════════════════════════════════════════
   RED BUTTON
   ════════════════════════════════════════════════════════ */
const redBtn = document.getElementById('red-btn');
const redCodeEl = document.getElementById('red-code');

let redLocalPressing = false;
let remotePressState = { phone: false, tablette: false, tableau: false };

redBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  redBtn.setPointerCapture(e.pointerId);
  redLocalPressing = true;
  remotePressState[DEVICE_ID] = true;
  redBtn.classList.add('pressing');
  publish('press-state', { device: DEVICE_ID, pressing: true });
  updateRedCodeDisplay();
});
function releaseRedBtn() {
  if (!redLocalPressing) return;
  redLocalPressing = false;
  remotePressState[DEVICE_ID] = false;
  redBtn.classList.remove('pressing');
  publish('press-state', { device: DEVICE_ID, pressing: false });
  updateRedCodeDisplay();
}
redBtn.addEventListener('pointerup', releaseRedBtn);
redBtn.addEventListener('pointercancel', releaseRedBtn);
redBtn.addEventListener('pointerleave', releaseRedBtn);

function updateRedCodeDisplay() {
  const allPressed = remotePressState.phone && remotePressState.tablette && remotePressState.tableau;
  redCodeEl.textContent = allPressed ? CODE_FRAGMENT : '_ _ _';
}

/* ════════════════════════════════════════════════════════
   END STATES
   ════════════════════════════════════════════════════════ */
function showEnd(kind) {
  const overlay = document.getElementById('overlay-end');
  const title = document.getElementById('end-title');
  overlay.classList.remove('victory', 'defeat');
  overlay.classList.add(kind);
  if (kind === 'victory') title.textContent = 'VOUS AVEZ SAUVÉ LE PROJET HÉLIOS,\nFÉLICITATIONS';
  else title.textContent = "VOUS N'ÊTES PAS PARVENUS À SAUVER\nLE PROJET HÉLIOS\n\nVOUS ÊTES MORTS ASPHYXIÉS";
  overlay.classList.add('active');
}
function hideEnd() {
  document.getElementById('overlay-end').classList.remove('active');
}

function resetAll() {
  hideEnd();
  backToLanding();
  showPage('landing');
}
</script>
</body>
</html>
